<!DOCTYPE html>
<html lang="vi" class="dark"> <!-- Bật chế độ nền tối (dark mode) mặc định, bạn có thể bỏ class="dark" nếu muốn nền sáng -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale1.0">
    <title>Thành Mắm - Trang Bio</title>
    
    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tải Font Awesome (cho icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Tải font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Sử dụng font Inter làm font chữ mặc định */
        body {
            font-family: 'Inter', sans-serif;
        }
        
        /* Căn chỉnh kích thước cho Font Awesome icons */
        .fa-fw {
            width: 1.5rem; /* Tương đương w-6 của Tailwind */
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-300">

    <div class="container mx-auto min-h-screen flex items-center justify-center p-4">
        
        <div class="w-full max-w-md">
            <!-- Khối nội dung chính -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 md:p-10 transition-all">
                
                <!-- Phần thông tin cá nhân -->
                <header class="flex flex-col items-center text-center">
                    <!-- Ảnh đại diện (Placeholder) -->
                    <!-- Thay thế URL trong src bằng link ảnh đại diện của bạn -->
                    <img 
                        class="w-28 h-28 md:w-32 md:h-32 rounded-full shadow-xl object-cover border-4 border-white dark:border-gray-700" 
                        src="https://placehold.co/128x128/34d399/ffffff?text=TM" 
                        alt="Ảnh đại diện Thành Mắm"
                        onerror="this.src='https://placehold.co/128x128/34d399/ffffff?text=TM'"
                    >
                    
                    <h1 class="text-2xl md:text-3xl font-bold mt-5">Thành Mắm</h1>
                    <p class="text-base text-gray-500 dark:text-gray-400 mt-1">@thanhmam.com</p>
                    <p class="text-sm md:text-base mt-3 max-w-xs">
                        Kết nối với tôi qua các nền tảng dưới đây.
                    </p>
                </header>

                <!-- Phần danh sách liên kết -->
                <main class="mt-8 flex flex-col space-y-4">
                    
                    <!-- Zalo -->
                    <a href="https://zalo.me/0946040289" target="_blank" rel="noopener noreferrer" 
                       class="group flex items-center justify-center w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3.5 px-5 rounded-xl shadow-lg transition-all duration-300 ease-in-out transform hover:-translate-y-0.5">
                        <!-- Icon Zalo (Đã cập nhật thành file ảnh) -->
                        <img src="Zalo App Logo.webp" alt="Zalo Logo" class="w-6 h-6 mr-3 object-contain">
                        <span>Zalo</span>
                    </a>
                    
                    <!-- Facebook -->
                    <a href="https://facebook.com/i.thanhmam" target="_blank" rel="noopener noreferrer" 
                       class="group flex items-center justify-center w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3.5 px-5 rounded-xl shadow-lg transition-all duration-300 ease-in-out transform hover:-translate-y-0.5">
                        <!-- Icon Facebook (Font Awesome) -->
                        <i class="fa-brands fa-facebook text-2xl fa-fw mr-3"></i>
                        <span>Facebook</span>
                    </a>
                    
                    <!-- Tiktok -->
                    <a href="https://tiktok.com/@thanhmam.com" target="_blank" rel="noopener noreferrer" 
                       class="group flex items-center justify-center w-full bg-black hover:bg-gray-700 text-white font-bold py-3.5 px-5 rounded-xl shadow-lg transition-all duration-300 ease-in-out transform hover:-translate-y-0.5">
                        <!-- Icon Tiktok (Font Awesome) -->
                        <i class="fa-brands fa-tiktok text-2xl fa-fw mr-3"></i>
                        <span>Tiktok</span>
                    </a>
                    
                    <!-- Website NextGen AI -->
                    <a href="https://nextgenai.vn" target="_blank" rel="noopener noreferrer" 
                       class="group flex items-center justify-center w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3.5 px-5 rounded-xl shadow-lg transition-all duration-300 ease-in-out transform hover:-translate-y-0.5">
                        <!-- Icon Website (Font Awesome) -->
                        <i class="fa-solid fa-globe text-2xl fa-fw mr-3"></i>
                        <span>Website NextGen AI</span>
                    </a>
                    
                    <!-- Website Cá nhân -->
                    <a href="https://thanhmam.com" target="_blank" rel="noopener noreferrer" 
                       class="group flex items-center justify-center w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3.5 px-5 rounded-xl shadow-lg transition-all duration-300 ease-in-out transform hover:-translate-y-0.5">
                        <!-- Icon Link (Font Awesome) -->
                        <i class="fa-solid fa-link text-2xl fa-fw mr-3"></i>
                        <span>Website Cá nhân</span>
                    </a>

                </main>
                
                <!-- Footer -->
                <footer class="text-center mt-10">
                    <p class="text-xs text-gray-400 dark:text-gray-500">
                        © 2025 | about.thanhmam.com
                    </p>
                </footer>
                
            </div>
        </div>

    </div>

</body>
</html>
