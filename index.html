    <!-- Thêm hiệu ứng Water Ripple -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ripples/0.5.3/jquery.ripples.min.js"></script>
    <script>
        $(document).ready(function() {
            try {
                // Tạo background động bằng Canvas (nền đen + đốm mờ màu xanh)
                const canvas = document.createElement('canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const ctx = canvas.getContext('2d');

                // Fill nền đen
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Hàm vẽ đốm mờ (blobs)
                const createBlob = (x, y, r, color) => {
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fill();
                };

                // Vẽ 2 đốm sáng màu xanh mềm mại (góc trên trái và góc dưới phải)
                const blobRadius = Math.max(canvas.width, canvas.height) * 0.4;
                createBlob(canvas.width * 0.2, canvas.height * 0.2, blobRadius, 'rgba(100, 150, 255, 0.4)');
                createBlob(canvas.width * 0.8, canvas.height * 0.8, blobRadius, 'rgba(100, 150, 255, 0.4)');

                // Chuyển canvas thành URL ảnh và gán làm background cho body
                const dataUrl = canvas.toDataURL();
                $('body').css({
                    'background-image': `url(${dataUrl})`,
                    'background-size': 'cover',
                    'background-position': 'center',
                    'background-attachment': 'fixed'
                });

                // Áp dụng hiệu ứng ripple lên body
                $('body').ripples({
                    resolution: 512,
                    dropRadius: 20, // Kích thước vòng tròn khi chạm
                    perturbance: 0.04, // Độ nhiễu/gợn sóng
                });
                
                // Tùy chọn: Tự động tạo hiệu ứng ngẫu nhiên (nếu muốn)
                // setInterval(function() {
                //    var $el = $('#ripple-bg');

                //    var dropRadius = 20;
                //    var strength = 0.04 + Math.random() * 0.04;
                //    $el.ripples('drop', x, y, dropRadius, strength);
                // }, 4000);
            } catch (e) {
                console.log("Ripples effect not supported or failed to load.", e);
            }
        });
    </script>
